<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zirkus Tipp Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Rye&display=swap');

        :root {
            --circus-red: #ff1744;
            --circus-yellow: #ffd600;
            --circus-blue: #00b0ff;
            --circus-green: #00e676;
            --circus-purple: #d500f9;
            --circus-orange: #ff9100;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: 
                repeating-linear-gradient(
                    90deg,
                    #ff1744 0px,
                    #ff1744 40px,
                    #ffd600 40px,
                    #ffd600 80px,
                    #00b0ff 80px,
                    #00b0ff 120px,
                    #00e676 120px,
                    #00e676 160px
                ),
                radial-gradient(circle at center, #1a0a0a 0%, #000000 100%);
            background-size: 160px 8px, 100% 100%;
            background-position: 0 0, center;
            color: #fff;
            font-family: 'Rye', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .page-title {
            color: var(--circus-yellow);
            margin: 0 0 6px;
            font-size: 64px;
            text-shadow: 
                3px 3px 0 var(--circus-red),
                6px 6px 0 var(--circus-blue),
                9px 9px 20px rgba(0,0,0,0.8);
            letter-spacing: 6px;
            animation: titleBounce 2s ease-in-out infinite;
        }

        @keyframes titleBounce {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .page-subtitle {
            margin: 0 0 18px;
            font-size: 22px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-family: 'Creepster', cursive;
        }

        #gameWrapper {
            position: relative;
            padding: 18px;
            background: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.03) 10px, rgba(255,255,255,0.03) 20px),
                linear-gradient(180deg, #8b0000 0%, #4a0000 100%);
            border-radius: 20px;
            box-shadow:
                0 0 40px rgba(255, 215, 0, 0.6),
                0 0 80px rgba(255, 23, 68, 0.4),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
            border: 8px solid #ffd600;
        }

        #gameContainer {
            position: relative;
            width: 960px;
            height: 560px;
            background: linear-gradient(180deg, #0a0520 0%, #1a0a30 100%);
            border: 6px solid var(--circus-red);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.7);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #hud {
            position: absolute;
            top: 14px;
            left: 18px;
            right: 18px;
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 12px;
            z-index: 12;
            align-items: center;
            font-size: 28px;
            color: #fff;
            pointer-events: none;
            font-family: 'Creepster', cursive;
        }

        #hud > div {
            background: linear-gradient(135deg, rgba(139,0,0,0.9) 0%, rgba(74,0,0,0.9) 100%);
            border: 3px solid var(--circus-yellow);
            border-radius: 12px;
            padding: 8px 14px;
            min-height: 48px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }

        #modeDisplay {
            justify-content: center;
            color: var(--circus-yellow);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #ticketsDisplay {
            color: var(--circus-green);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #wordPanel {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 420px;
            max-width: 92%;
            text-align: center;
            z-index: 11;
            background: linear-gradient(135deg, rgba(139,0,0,0.95) 0%, rgba(74,0,0,0.95) 100%);
            border: 4px solid var(--circus-yellow);
            border-radius: 16px;
            padding: 12px 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            display: none;
        }

        #wordLabel {
            color: #ffd600;
            font-size: 22px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-family: 'Creepster', cursive;
        }

        #wordDisplay {
            font-size: 68px;
            letter-spacing: 12px;
            line-height: 1;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            font-family: 'Rye', cursive;
        }

        #helperText {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: linear-gradient(135deg, rgba(139,0,0,0.9) 0%, rgba(74,0,0,0.9) 100%);
            border: 3px solid var(--circus-blue);
            border-radius: 999px;
            padding: 10px 22px;
            display: none;
            font-family: 'Creepster', cursive;
        }

        .typed {
            color: var(--circus-green);
            text-shadow: 0 0 20px var(--circus-green), 3px 3px 6px rgba(0,0,0,0.8);
        }

        .untyped {
            color: #888;
            opacity: 0.6;
        }

        .error {
            color: var(--circus-red);
            text-shadow: 0 0 25px var(--circus-red), 3px 3px 6px rgba(0,0,0,0.8);
        }

        .shake-active {
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            25% { transform: translateX(calc(-50% - 15px)) translateY(0); }
            75% { transform: translateX(calc(-50% + 15px)) translateY(0); }
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(8px);
        }

        .panel {
            width: min(900px, 94%);
            background: 
                repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(255,255,255,0.02) 15px, rgba(255,255,255,0.02) 30px),
                linear-gradient(135deg, rgba(139,0,0,0.98) 0%, rgba(74,0,0,0.98) 100%);
            border: 6px solid var(--circus-yellow);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            padding: 28px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 64px;
            margin: 0;
            text-align: center;
            color: var(--circus-yellow);
            text-shadow: 
                3px 3px 0 var(--circus-red),
                6px 6px 20px rgba(0,0,0,0.8);
            letter-spacing: 4px;
            font-family: 'Rye', cursive;
        }

        .panel-subtitle {
            font-size: 24px;
            text-align: center;
            margin: 8px 0 20px;
            color: #fff;
            font-family: 'Creepster', cursive;
        }

        .ticket-bank {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 38px;
            color: var(--circus-green);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            font-family: 'Rye', cursive;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .game-card {
            background: linear-gradient(135deg, rgba(26,10,48,0.95) 0%, rgba(10,5,32,0.95) 100%);
            border: 4px solid var(--circus-purple);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 300px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .game-card h3 {
            font-size: 38px;
            margin: 0;
            color: var(--circus-orange);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            font-family: 'Rye', cursive;
        }

        .game-card p {
            margin: 0;
            font-size: 20px;
            color: #ddd;
            line-height: 1.3;
            font-family: 'Creepster', cursive;
        }

        .card-meta {
            font-size: 18px;
            color: #aaa;
            font-family: 'Creepster', cursive;
        }

        .bootBtn {
            padding: 14px 32px;
            font-size: 32px;
            font-family: 'Rye', cursive;
            background: linear-gradient(135deg, var(--circus-red) 0%, var(--circus-purple) 100%);
            color: #fff;
            border: 4px solid var(--circus-yellow);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            box-shadow: 0 6px 16px rgba(0,0,0,0.6);
            text-transform: uppercase;
        }

        .bootBtn:hover {
            transform: scale(1.08) rotate(-2deg);
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.8);
        }

        .bootBtn.secondary {
            background: linear-gradient(135deg, var(--circus-blue) 0%, var(--circus-green) 100%);
        }

        .card-actions {
            margin-top: auto;
        }

        .small-note {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            color: #bbb;
            font-family: 'Creepster', cursive;
        }

        #summaryScreen {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 20px 0;
        }

        .stat-box {
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 14px;
            border-radius: 12px;
            border: 3px solid var(--circus-blue);
        }

        .stat-label {
            color: #ffd600;
            font-size: 22px;
            text-transform: uppercase;
            font-family: 'Creepster', cursive;
        }

        .stat-value {
            color: #fff;
            font-size: 44px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            font-family: 'Rye', cursive;
        }

        .stat-value.bad {
            color: var(--circus-red);
        }

        .summary-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        @media (max-width: 1000px) {
            #gameContainer {
                width: 92vw;
                height: min(72vh, 560px);
            }

            .game-grid {
                grid-template-columns: 1fr;
            }

            #hud {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            #wordDisplay {
                font-size: 52px;
            }
        }
    </style>
</head>
<body>
