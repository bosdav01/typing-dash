<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geometry Type Dash Optimized</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

        :root {
            --bg: #0b0c10;
            --panel: #1f2833;
            --cyan: #66fcf1;
            --white: #ffffff;
            --muted: #c5c6c7;
            --red: #ff0055;
            --yellow: #fce81a;
            --ground: #121212;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
            margin: 0 0 8px;
        }

        .subtitle {
            color: var(--muted);
            margin: 0 0 18px;
            text-align: center;
            padding: 0 12px;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 450px;
            max-width: calc(100vw - 24px);
            max-height: calc((100vw - 24px) * 0.5625);
            background: linear-gradient(180deg, var(--panel) 0%, var(--bg) 100%);
            border: 4px solid var(--cyan);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.35);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 18px;
            left: 18px;
            right: 18px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            z-index: 10;
            color: var(--muted);
            text-shadow: 0 0 5px rgba(255,255,255,0.35);
        }

        #wordDisplay {
            position: absolute;
            top: 108px;
            width: 100%;
            text-align: center;
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 6px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0,0,0,0.85);
            user-select: none;
            min-height: 64px;
        }

        .typed {
            color: var(--cyan);
            text-shadow: 0 0 15px var(--cyan);
        }

        .untyped {
            color: var(--white);
        }

        .error {
            color: var(--red);
            text-shadow: 0 0 15px var(--red);
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 12, 16, 0.88);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
            padding: 24px;
            backdrop-filter: blur(4px);
        }

        #overlayTitle {
            font-size: 45px;
            color: var(--red);
            text-shadow: 0 0 15px var(--red);
            margin: 0 0 10px;
        }

        #overlayText {
            color: var(--white);
            font-size: 20px;
            max-width: 560px;
            line-height: 1.5;
            margin: 0;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 26px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 26px;
            font-size: 18px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            background-color: transparent;
            color: var(--cyan);
            border: 3px solid var(--cyan);
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--cyan);
            color: var(--bg);
            box-shadow: 0 0 18px var(--cyan);
            transform: scale(1.05);
        }

        button.secondary {
            color: var(--muted);
            border-color: rgba(197, 198, 199, 0.45);
        }

        button.secondary:hover {
            background: rgba(197, 198, 199, 0.2);
            color: var(--white);
            box-shadow: none;
        }

        .level-up {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: var(--yellow);
            text-shadow: 0 0 20px var(--yellow);
            opacity: 0;
            z-index: 15;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .hintbar {
            margin-top: 15px;
            color: #8e9499;
            font-size: 14px;
            text-align: center;
            letter-spacing: 2px;
        }

        @media (max-width: 860px) {
            #wordDisplay { font-size: 34px; top: 96px; letter-spacing: 4px; }
            #ui { font-size: 15px; }
            .subtitle { font-size: 14px; }
        }
    </style>
</head>
<body>
    <h1>Geometry Type Dash</h1>
    <p class="subtitle">Tippe fehlerfrei im Takt. Die Musik läuft beat-synchron zum Gameplay.</p>

    <div id="gameContainer">
        <div id="ui">
            <span id="scoreDisplay">SCORE: 0</span>
            <span id="levelDisplay">LEVEL: 1</span>
            <span id="comboDisplay">COMBO: 0</span>
            <span id="audioDisplay">AUDIO: ON</span>
        </div>

        <div id="wordDisplay"></div>
        <div id="levelUpMsg" class="level-up">LEVEL UP!</div>
        <canvas id="gameCanvas" width="800" height="450"></canvas>

        <div id="overlay">
            <h2 id="overlayTitle">SYSTEM READY</h2>
            <p id="overlayText">Finger auf die Grundreihe. Die Musik startet gemeinsam mit dem Run und bleibt in einem stabilen Raster.</p>
            <div class="controls">
                <button id="startBtn">START DASH</button>
                <button id="audioBtn" class="secondary">AUDIO TOGGLE</button>
            </div>
            <div class="hintbar">Grundreihe: ASDF JKLÖ</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const wordDisplay = document.getElementById('wordDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const audioDisplay = document.getElementById('audioDisplay');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayText = document.getElementById('overlayText');
        const startBtn = document.getElementById('startBtn');
        const audioBtn = document.getElementById('audioBtn');
        const levelUpMsg = document.getElementById('levelUpMsg');

        // Farbpalette aus CSS für Canvas
        const COLORS = {
            cyan: '#66fcf1',
            red: '#ff0055',
            bg: '#0b0c10',
            panel: '#1f2833',
            ground: '#121212',
            yellow: '#fce81a',
            white: '#ffffff'
        };

        const CONFIG = {
            width: 800,
            height: 450,
            groundY: 380,
            baseSpeed: 320,
            speedGainPerPass: 10,
            level2Score: 50,
            level3Score: 150,
            bpmByLevel: {
                1: 128,
                2: 138,
                3: 148
            }
        };

        const WORDS = {
            1: ["a", "s", "d", "f", "g", "h", "j", "k", "l", "ö"],
            2: ["as", "df", "ja", "so", "da", "la", "al", "ha", "fl", "gl"],
            3: ["das", "all", "hall", "kahl", "lass", "fall", "gas", "glas", "schlag", "fad", "lag"]
        };

        const state = {
            gameActive: false,
            score: 0,
            level: 1,
            combo: 0,
            speed: CONFIG.baseSpeed,
            currentWord: '',
            typedText: '',
            lastTime: 0,
            animationId: null,
            backgroundOffset: 0,
            mountainOffset: 0,
            audioEnabled: true,
            nextSpawnTimer: 0
        };

        const player = {
            x: 120,
            y: CONFIG.groundY - 40,
            width: 40,
            height: 40,
            vy: 0,
            jumpForce: -720,
            gravity: 2300,
            isJumping: false,
            rotation: 0,
            trail: []
        };

        // Neue Arrays für visuelle Vielfalt
        let obstacles = [];
        let particles = [];
        let floatingTexts = [];
        let stars = [];

        // Sterne initialisieren
        for(let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * CONFIG.width,
                y: Math.random() * (CONFIG.groundY - 60),
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 20 + 10
            });
        }

        const audio = {
            ctx: null, master: null, musicGain: null, sfxGain: null,
            nextNoteTime: 0, schedulerId: null, isRunning: false,
            lookaheadMs: 25, scheduleAheadTime: 0.14,
            beatIndex: 0, currentBpm: CONFIG.bpmByLevel[1],
            leadSynthEnabled: true
        };

        function ensureAudio() {
            if (audio.ctx) return;
            audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
            audio.master = audio.ctx.createGain();
            audio.musicGain = audio.ctx.createGain();
            audio.sfxGain = audio.ctx.createGain();

            audio.master.gain.value = 0.8;
            audio.musicGain.gain.value = 0.18;
            audio.sfxGain.gain.value = 0.28;

            audio.musicGain.connect(audio.master);
            audio.sfxGain.connect(audio.master);
            audio.master.connect(audio.ctx.destination);
        }

        async function resumeAudio() {
            ensureAudio();
            if (audio.ctx.state === 'suspended') await audio.ctx.resume();
        }

        function updateAudioLabel() {
            audioDisplay.textContent = `AUDIO: ${state.audioEnabled ? 'ON' : 'OFF'}`;
        }

        function setMusicBpmForLevel() {
            audio.currentBpm = CONFIG.bpmByLevel[state.level] || CONFIG.bpmByLevel[3];
        }

        function startMusic() {
            if (!state.audioEnabled) return;
            ensureAudio();
            stopMusic(false);
            setMusicBpmForLevel();
            audio.nextNoteTime = audio.ctx.currentTime + 0.08;
            audio.beatIndex = 0;
            audio.isRunning = true;
            audio.schedulerId = setInterval(scheduleMusic, audio.lookaheadMs);
        }

        function stopMusic(hardMute = true) {
            if (audio.schedulerId) {
                clearInterval(audio.schedulerId);
                audio.schedulerId = null;
            }
            audio.isRunning = false;
            if (hardMute && audio.musicGain) {
                const now = audio.ctx.currentTime;
                audio.musicGain.gain.cancelScheduledValues(now);
                audio.musicGain.gain.setValueAtTime(audio.musicGain.gain.value, now);
                audio.musicGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
                setTimeout(() => { if (audio.musicGain) audio.musicGain.gain.value = 0.18; }, 120);
            }
        }

        function scheduleMusic() {
            if (!audio.ctx || !audio.isRunning || !state.gameActive) return;
            while (audio.nextNoteTime < audio.ctx.currentTime + audio.scheduleAheadTime) {
                scheduleBeat(audio.nextNoteTime, audio.beatIndex);
                const secondsPerBeat = 60 / audio.currentBpm;
                audio.nextNoteTime += secondsPerBeat;
                audio.beatIndex++;
            }
        }

        function scheduleBeat(time, beatIndex) {
            const beatInBar = beatIndex % 4;
            const isKick = beatInBar === 0 || beatInBar === 2;
            const isSnare = beatInBar === 1 || beatInBar === 3;
            const isLead = beatIndex % 2 === 0;

            if (isKick) synthKick(time);
            if (isSnare) synthSnare(time);
            synthHat(time);
            if (isLead) synthLead(time, beatIndex);
        }

        function synthKick(time) {
            const osc = audio.ctx.createOscillator();
            const gain = audio.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(45, time + 0.12);
            gain.gain.setValueAtTime(0.9, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.14);
            osc.connect(gain).connect(audio.musicGain);
            osc.start(time); osc.stop(time + 0.15);
        }

        function synthSnare(time) {
            const bufferSize = audio.ctx.sampleRate * 0.14;
            const buffer = audio.ctx.createBuffer(1, bufferSize, audio.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2.5);
            const noise = audio.ctx.createBufferSource();
            const filter = audio.ctx.createBiquadFilter();
            const gain = audio.ctx.createGain();
            noise.buffer = buffer; filter.type = 'highpass'; filter.frequency.value = 1500;
            gain.gain.setValueAtTime(0.35, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.11);
            noise.connect(filter).connect(gain).connect(audio.musicGain);
            noise.start(time); noise.stop(time + 0.12);
        }

        function synthHat(time) {
            const bufferSize = audio.ctx.sampleRate * 0.04;
            const buffer = audio.ctx.createBuffer(1, bufferSize, audio.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 7);
            const noise = audio.ctx.createBufferSource();
            const filter = audio.ctx.createBiquadFilter();
            const gain = audio.ctx.createGain();
            noise.buffer = buffer; filter.type = 'highpass'; filter.frequency.value = 5500;
            gain.gain.setValueAtTime(0.12, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
            noise.connect(filter).connect(gain).connect(audio.musicGain);
            noise.start(time); noise.stop(time + 0.04);
        }

        function synthLead(time, beatIndex) {
            if (!audio.leadSynthEnabled) return;
            const pattern = [523.25, 659.25, 783.99, 659.25, 587.33, 698.46, 880.0, 698.46];
            const freq = pattern[beatIndex % pattern.length];
            const osc = audio.ctx.createOscillator();
            const gain = audio.ctx.createGain();
            const filter = audio.ctx.createBiquadFilter();
            osc.type = 'square'; osc.frequency.setValueAtTime(freq, time);
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(1800, time);
            gain.gain.setValueAtTime(0.0001, time); gain.gain.linearRampToValueAtTime(0.08, time + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
            osc.connect(filter).connect(gain).connect(audio.musicGain);
            osc.start(time); osc.stop(time + 0.2);
        }

        function playJumpSfx() {
            if (!state.audioEnabled || !audio.ctx) return;
            const now = audio.ctx.currentTime;
            const osc = audio.ctx.createOscillator();
            const gain = audio.ctx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(500, now);
            osc.frequency.exponentialRampToValueAtTime(950, now + 0.08);
            gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
            osc.connect(gain).connect(audio.sfxGain);
            osc.start(now); osc.stop(now + 0.1);
        }

        function playCrashSfx() {
            if (!state.audioEnabled || !audio.ctx) return;
            const now = audio.ctx.currentTime;
            const bufferSize = audio.ctx.sampleRate * 0.2;
            const buffer = audio.ctx.createBuffer(1, bufferSize, audio.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.8);
            const noise = audio.ctx.createBufferSource();
            const filter = audio.ctx.createBiquadFilter();
            const gain = audio.ctx.createGain();
            noise.buffer = buffer; filter.type = 'bandpass'; filter.frequency.value = 500;
            gain.gain.setValueAtTime(0.35, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            noise.connect(filter).connect(gain).connect(audio.sfxGain);
            noise.start(now); noise.stop(now + 0.22);
        }

        function playLevelUpSfx() {
            if (!state.audioEnabled || !audio.ctx) return;
            const now = audio.ctx.currentTime;
            [659.25, 783.99, 1046.5].forEach((freq, i) => {
                const t = now + i * 0.05;
                const osc = audio.ctx.createOscillator();
                const gain = audio.ctx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0.0001, t); gain.gain.linearRampToValueAtTime(0.08, t + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                osc.connect(gain).connect(audio.sfxGain);
                osc.start(t); osc.stop(t + 0.2);
            });
        }

        function getWordForLevel() {
            const pool = WORDS[state.level] || WORDS[3];
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function getSecondsPerBeat() {
            return 60 / (CONFIG.bpmByLevel[state.level] || CONFIG.bpmByLevel[3]);
        }

        // Visuelle Effekte
        function createParticles(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 300, 
                    vy: (Math.random() - 1) * 300,
                    size: Math.random() * 4 + 2, 
                    life: 1, 
                    color: color
                });
            }
        }

        function addFloatingText(text, x, y, color) {
            floatingTexts.push({ text: text, x: x, y: y, life: 1, color: color });
        }

        function spawnObstacle() {
            let types = ['spike', 'double_spike', 'platform_lava', 'laser_wall'];
            
            // Etwas Abwechslung erzwingen
            let type = types[Math.floor(Math.random() * types.length)];
            if (type === state.lastObstacleType) {
                type = types[(types.indexOf(type) + 1) % types.length];
            }
            state.lastObstacleType = type;

            let obs = { x: CONFIG.width, passed: false, type: type };

            if (type === 'spike') {
                obs.y = CONFIG.groundY - 40; obs.width = 40; obs.height = 40;
            } else if (type === 'double_spike') {
                obs.y = CONFIG.groundY - 40; obs.width = 80; obs.height = 40;
            } else if (type === 'platform_lava') {
                obs.y = CONFIG.groundY - 100; obs.width = 160; obs.height = 20;
            } else if (type === 'laser_wall') {
                obs.y = CONFIG.groundY - 55; obs.width = 20; obs.height = 55; 
            }

            obstacles.push(obs);

            state.currentWord = getWordForLevel();
            state.typedText = '';
            renderWord();
        }

        function queueNextObstacle() {
            const beat = getSecondsPerBeat();
            const beatsUntilNext = state.level === 1 ? 4 : state.level === 2 ? 4 : 3;
            state.nextSpawnTimer = beat * beatsUntilNext;
        }

        function renderWord(isError = false) {
            let html = '';
            for (let i = 0; i < state.currentWord.length; i++) {
                if (i < state.typedText.length) {
                    const cls = isError && i === state.typedText.length - 1 ? 'error' : 'typed';
                    html += `<span class="${cls}">${state.currentWord[i]}</span>`;
                } else {
                    html += `<span class="untyped">${state.currentWord[i]}</span>`;
                }
            }
            wordDisplay.innerHTML = html;
        }

        function resetPlayer() {
            player.y = CONFIG.groundY - player.height;
            player.vy = 0;
            player.isJumping = false;
            player.rotation = 0;
            player.trail = [];
        }

        function jump() {
            if (player.isJumping) return;
            player.vy = player.jumpForce;
            player.isJumping = true;
            createParticles(player.x + player.width/2, player.y + player.height, COLORS.cyan, 12);
            playJumpSfx();
        }

        function triggerLevelUp() {
            levelUpMsg.style.opacity = 1;
            playLevelUpSfx();
            setTimeout(() => { levelUpMsg.style.opacity = 0; }, 1200);
        }

        function updateLevel() {
            if (state.score >= CONFIG.level3Score && state.level < 3) {
                state.level = 3;
                setMusicBpmForLevel();
                triggerLevelUp();
            } else if (state.score >= CONFIG.level2Score && state.level < 2) {
                state.level = 2;
                setMusicBpmForLevel();
                triggerLevelUp();
            }
        }

        function initGame() {
            state.score = 0;
            state.level = 1;
            state.combo = 0;
            state.speed = CONFIG.baseSpeed;
            state.currentWord = '';
            state.typedText = '';
            state.justErrored = false;
            state.lastTime = 0;
            state.backgroundOffset = 0;
            state.mountainOffset = 0;
            
            obstacles = [];
            particles = [];
            floatingTexts = [];
            
            resetPlayer();
            spawnObstacle();
            queueNextObstacle();
            updateUI();
            
            overlay.style.display = 'none';
            state.gameActive = true;
            cancelAnimationFrame(state.animationId);
            state.animationId = requestAnimationFrame(gameLoop);
        }

        function gameOver(reason) {
            state.gameActive = false;
            stopMusic();
            playCrashSfx();
            createParticles(player.x + player.width/2, player.y + player.height/2, COLORS.red, 40);
            
            // Leichte Verzögerung für den Todesscreen (damit man die Explosion sieht)
            setTimeout(() => {
                overlay.style.display = 'flex';
                overlayTitle.innerText = 'CRASHED!';
                overlayText.innerText = `${reason} | Score: ${state.score}`;
                startBtn.innerText = 'RETRY';
                wordDisplay.innerHTML = '';
            }, 800);
        }

        function update(delta) {
            // Parallax Backgrounds
            state.backgroundOffset -= state.speed * 0.22 * delta;
            if (state.backgroundOffset <= -40) state.backgroundOffset += 40;
            
            state.mountainOffset -= state.speed * 0.08 * delta;
            if (state.mountainOffset <= -800) state.mountainOffset += 800;

            // Stars
            stars.forEach(s => {
                s.x -= s.speed * 60 * delta;
                if(s.x < 0) { s.x = CONFIG.width; s.y = Math.random() * (CONFIG.groundY - 60); }
            });

            // Player Physics
            player.vy += player.gravity * delta;
            player.y += player.vy * delta;

            // Geometry Dash Rotation! (Nur in der Luft)
            if (player.isJumping || player.vy > 50) {
                player.rotation += 7.4 * delta;
            } else {
                const snapAngle = Math.PI / 2;
                player.rotation = Math.round(player.rotation / snapAngle) * snapAngle;
            }

            // Bodenkollision
            let currentFloorY = CONFIG.groundY;
            let onLava = false;

            // Hindernisse bewegen und Kollision prüfen
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= state.speed * delta;

                // Spezifische Hitboxen für Fairness
                if (obs.type === 'spike' || obs.type === 'double_spike') {
                    if (player.x < obs.x + obs.width - 10 && player.x + player.width - 10 > obs.x &&
                        player.y < obs.y + obs.height && player.y + player.height > obs.y + 12) {
                        gameOver('In Stacheln gefahren!');
                        return;
                    }
                } 
                else if (obs.type === 'laser_wall') {
                    if (player.x < obs.x + obs.width - 5 && player.x + player.width - 5 > obs.x &&
                        player.y < obs.y + obs.height && player.y + player.height > obs.y + 5) {
                        gameOver('Vom Laser getroffen!');
                        return;
                    }
                }
                else if (obs.type === 'platform_lava') {
                    if (player.x + player.width > obs.x + 10 && player.x < obs.x + obs.width - 10) onLava = true; 
                    
                    // Landung auf Plattform
                    if (player.vy >= 0 && player.y + player.height >= obs.y && player.y + player.height <= obs.y + 25 &&
                        player.x + player.width > obs.x && player.x < obs.x + obs.width) {
                        currentFloorY = obs.y;
                        player.y = currentFloorY - player.height;
                        player.vy = 0;
                        if (player.isJumping) {
                            player.isJumping = false;
                            createParticles(player.x + player.width/2, player.y + player.height, COLORS.cyan, 10);
                        }
                        onLava = false; 
                    } 
                    // Crash in Plattform Wand
                    else if (player.x + player.width > obs.x + 8 && player.x < obs.x + obs.width &&
                             player.y + player.height > obs.y + 8 && player.y < obs.y + obs.height) {
                        gameOver('Gegen die Plattform gekracht!');
                        return;
                    }
                }

                // Hindernis erfolgreich passiert (Score / Spawner)
                if (obs.x + obs.width < player.x && !obs.passed) {
                    obs.passed = true;
                    state.score += 10;
                    state.combo += 1;
                    state.speed += CONFIG.speedGainPerPass;
                    updateLevel();
                    queueNextObstacle();
                    addFloatingText("+10", player.x, player.y - 30, COLORS.cyan);
                }
            }

            // In Lava gefallen
            if (onLava && player.y >= CONFIG.groundY - player.height - 5) {
                gameOver('In der Lava verbrannt!');
                return;
            }

            // Normaler Boden Fallback
            if (player.y >= CONFIG.groundY - player.height && currentFloorY === CONFIG.groundY && !onLava) {
                player.y = CONFIG.groundY - player.height;
                player.vy = 0;
                player.isJumping = false;
            }

            // Trail Logic
            player.trail.push({
                x: player.x + player.width / 2,
                y: player.y + player.height / 2,
                rot: player.rotation,
                life: 0.25
            });
            for (const p of player.trail) p.life -= delta;
            player.trail = player.trail.filter(p => p.life > 0);

            // Spawner Logic
            state.nextSpawnTimer -= delta;
            if (state.nextSpawnTimer <= 0 && state.gameActive) {
                spawnObstacle();
                state.nextSpawnTimer = 999; // Verhindert mehrfaches spawnen bis `queueNextObstacle` gerufen wird
            }

            // Array Cleanup (Hindernisse hinter dem Bildschirm)
            if (obstacles.length > 0 && obstacles[0].x + obstacles[0].width < -100) {
                obstacles.shift();
            }

            // Partikel & Text Update
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].vy += 1500 * delta; // Gravity für Partikel
                particles[i].x += particles[i].vx * delta; 
                particles[i].y += particles[i].vy * delta; 
                particles[i].life -= delta * 1.5;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y -= 60 * delta; 
                floatingTexts[i].life -= delta * 1.2;
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }
        }

        function drawBackground() {
            ctx.clearRect(0, 0, CONFIG.width, CONFIG.height);

            // Sky
            const sky = ctx.createLinearGradient(0, 0, 0, CONFIG.height);
            sky.addColorStop(0, COLORS.panel);
            sky.addColorStop(1, COLORS.bg);
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);

            // Stars
            ctx.fillStyle = COLORS.white;
            stars.forEach(s => { 
                ctx.globalAlpha = Math.random() * 0.5 + 0.3; 
                ctx.fillRect(s.x, s.y, s.size, s.size); 
            });
            ctx.globalAlpha = 1;

            // Retro Sun
            ctx.fillStyle = COLORS.red; 
            ctx.shadowBlur = 60; ctx.shadowColor = COLORS.red;
            ctx.beginPath(); ctx.arc(400, 250, 140, Math.PI, 0); ctx.fill(); ctx.shadowBlur = 0;
            ctx.fillStyle = COLORS.panel;
            for(let i=0; i<6; i++) ctx.fillRect(200, 210 - (i*16), 400, i*3.5);

            // Mountains
            ctx.fillStyle = COLORS.bg; ctx.beginPath(); ctx.moveTo(0, CONFIG.groundY);
            for(let i = 0; i < 20; i++) ctx.lineTo((i * 100) + state.mountainOffset, CONFIG.groundY - 80 - Math.abs(Math.sin(i * 45) * 60));
            ctx.lineTo(CONFIG.width * 2, CONFIG.groundY); ctx.fill();
            ctx.strokeStyle = '#b026ff'; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = '#b026ff';
            ctx.stroke(); ctx.shadowBlur = 0;

            // Perspective Grid
            ctx.strokeStyle = 'rgba(102, 252, 241, 0.2)'; ctx.lineWidth = 2; ctx.shadowBlur = 5; ctx.shadowColor = COLORS.cyan;
            for (let i = -100; i < CONFIG.width + 100; i += 60) {
                ctx.beginPath(); ctx.moveTo(i + state.backgroundOffset, CONFIG.groundY);
                ctx.lineTo((i - 400) * 2 + 400, CONFIG.height); ctx.stroke();
            }

            // Ground Fill & Line
            ctx.fillStyle = COLORS.ground;
            ctx.fillRect(0, CONFIG.groundY, CONFIG.width, CONFIG.height - CONFIG.groundY);
            ctx.shadowBlur = 15; ctx.shadowColor = COLORS.cyan;
            ctx.strokeStyle = COLORS.cyan; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, CONFIG.groundY); ctx.lineTo(CONFIG.width, CONFIG.groundY); ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawPlayer() {
            // Trail
            for (const t of player.trail) {
                ctx.save();
                ctx.translate(t.x, t.y);
                ctx.rotate(t.rot);
                ctx.globalAlpha = t.life / 0.25 * 0.35;
                ctx.fillStyle = COLORS.cyan;
                ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
                ctx.restore();
            }

            if(state.gameActive) {
                ctx.save();
                ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
                ctx.rotate(player.rotation);
                ctx.fillStyle = COLORS.cyan;
                ctx.shadowBlur = 15;
                ctx.shadowColor = COLORS.cyan;
                ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
                ctx.fillStyle = COLORS.bg;
                ctx.fillRect(-player.width / 4, -player.height / 4, player.width / 2, player.height / 2);
                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                if (obs.type === 'spike' || obs.type === 'double_spike') {
                    ctx.shadowBlur = 15; ctx.shadowColor = COLORS.red; ctx.fillStyle = COLORS.red;
                    for(let i = 0; i < (obs.type === 'double_spike' ? 2 : 1); i++) {
                        let offsetX = obs.x + (i * 40);
                        ctx.beginPath(); ctx.moveTo(offsetX + 20, obs.y);
                        ctx.lineTo(offsetX + 40, obs.y + obs.height); ctx.lineTo(offsetX, obs.y + obs.height);
                        ctx.closePath(); ctx.fill();
                        
                        ctx.fillStyle = COLORS.bg; ctx.shadowBlur = 0;
                        ctx.beginPath(); ctx.moveTo(offsetX + 20, obs.y + 12);
                        ctx.lineTo(offsetX + 32, obs.y + obs.height - 4); ctx.lineTo(offsetX + 8, obs.y + obs.height - 4);
                        ctx.closePath(); ctx.fill(); ctx.fillStyle = COLORS.red; 
                    }
                } 
                else if (obs.type === 'laser_wall') {
                    ctx.shadowBlur = 20; ctx.shadowColor = COLORS.cyan; ctx.fillStyle = "rgba(102, 252, 241, 0.85)";
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.fillStyle = COLORS.white; ctx.fillRect(obs.x + 8, obs.y, 4, obs.height);
                }
                else if (obs.type === 'platform_lava') {
                    let lavaWave = Math.sin(Date.now() * 0.005) * 5; 
                    ctx.fillStyle = "#ff3300"; ctx.shadowBlur = 25; ctx.shadowColor = "#ff0000";
                    ctx.fillRect(obs.x, CONFIG.groundY - 5 + lavaWave, obs.width, 25);
                    ctx.fillStyle = COLORS.yellow; ctx.fillRect(obs.x + 10, CONFIG.groundY + lavaWave, obs.width - 20, 10);
                    
                    ctx.shadowBlur = 15; ctx.shadowColor = '#b026ff'; ctx.fillStyle = '#b026ff';
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.fillStyle = COLORS.bg; ctx.fillRect(obs.x + 3, obs.y + 3, obs.width - 6, obs.height - 6);
                }
                ctx.shadowBlur = 0;
            });
        }

        function drawEffects() {
            // Partikel
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.shadowBlur = 15; ctx.shadowColor = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
            
            // Text (+10)
            ctx.font = "bold 24px Orbitron"; ctx.textAlign = "center";
            floatingTexts.forEach(ft => {
                ctx.fillStyle = ft.color; ctx.globalAlpha = ft.life;
                ctx.shadowBlur = 10; ctx.shadowColor = ft.color;
                ctx.fillText(ft.text, ft.x, ft.y);
            });
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        }

        function draw() {
            drawBackground();
            drawObstacles();
            drawPlayer();
            drawEffects();
        }

        function updateUI() {
            scoreDisplay.innerText = `SCORE: ${state.score}`;
            levelDisplay.innerText = `LEVEL: ${state.level}`;
            comboDisplay.innerText = `COMBO: ${state.combo}`;
            updateAudioLabel();
        }

        function gameLoop(timestamp) {
            if (!state.lastTime) state.lastTime = timestamp;
            const delta = Math.min((timestamp - state.lastTime) / 1000, 0.03);
            state.lastTime = timestamp;

            if (state.gameActive) update(delta);
            draw();
            updateUI();

            if (state.gameActive || particles.length > 0) {
                state.animationId = requestAnimationFrame(gameLoop);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!state.gameActive) {
                // Erlaube Quick-Restart mit Enter
                if (e.key === 'Enter' && overlay.style.display !== 'none' && startBtn.innerText === 'RETRY') {
                    startBtn.click();
                }
                return;
            }
            if (e.repeat) return;
            if (["Shift", "Control", "Alt", "Meta", "Tab", "CapsLock"].includes(e.key)) return;

            const expectedChar = state.currentWord[state.typedText.length];
            const typedChar = e.key.toLowerCase();

            if (!expectedChar) return;

            if (typedChar === expectedChar) {
                state.typedText += typedChar;
                renderWord();

                if (state.typedText === state.currentWord) {
                    jump();
                    wordDisplay.innerHTML = '';
                }
            } else {
                state.typedText += typedChar;
                renderWord(true);
                state.combo = 0;
                gameOver('Tippfehler!');
            }
        });

        startBtn.addEventListener('click', async () => {
            await resumeAudio();
            startMusic();
            initGame();
        });

        audioBtn.addEventListener('click', async () => {
            state.audioEnabled = !state.audioEnabled;
            updateAudioLabel();
            if (state.audioEnabled) {
                await resumeAudio();
                if (state.gameActive) startMusic();
            } else {
                stopMusic();
            }
        });

        updateUI();
        draw(); // Zeichnet initial den Titelbildschirm
    </script>
</body>
</html>
