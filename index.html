<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Type Dash - Synthwave Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Scanline CRT Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 450px;
            background: linear-gradient(180deg, #200122 0%, #000000 100%);
            border: 4px solid #f0f;
            border-radius: 10px;
            box-shadow: 0 0 30px #f0f, inset 0 0 20px #0ff;
            overflow: hidden;
            z-index: 10;
        }

        canvas { display: block; }

        #ui {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 28px;
            z-index: 10;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }

        #wordDisplay {
            position: absolute;
            top: 100px;
            width: 100%;
            text-align: center;
            font-size: 60px;
            letter-spacing: 8px;
            z-index: 10;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            transition: transform 0.1s;
        }

        .typed { color: #f0f; text-shadow: 0 0 20px #f0f; }
        .untyped { color: #fff; text-shadow: 0 0 10px #fff; }
        .error { color: #ff0000; text-shadow: 0 0 20px #ff0000; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            50% { transform: translateX(15px); }
            75% { transform: translateX(-15px); }
            100% { transform: translateX(0); }
        }
        .shake-active { animation: shake 0.2s; }

        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        h1 {
            color: #f0f;
            font-size: 40px;
            text-shadow: 0 0 20px #f0f, 0 0 40px #0ff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        #overlayTitle {
            font-size: 60px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff;
            margin-bottom: 10px;
        }

        #lockInDisplay {
            font-size: 50px;
            letter-spacing: 15px;
            margin-top: 20px;
            color: #444;
        }
        .lock-typed { color: #0ff; text-shadow: 0 0 20px #0ff; }

    </style>
</head>
<body>

    <h1 style="z-index: 10;">SYNTHWAVE TYPE DASH</h1>
    <p style="color: #0ff; margin-bottom: 20px; z-index: 10; font-size: 20px;">Weiche Lava und Stacheln aus. Falsche Tasten wackeln nur.</p>

    <div id="gameContainer">
        <div id="ui">
            <span id="scoreDisplay">SCORE: 0</span>
            <span id="levelDisplay">LEVEL: 1</span>
        </div>
        <div id="wordDisplay"></div>
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        
        <div id="overlay">
            <h2 id="overlayTitle">PLAYER LOCK-IN</h2>
            <p id="overlayText" style="color: #fff; font-size: 24px;">Tippe die Grundreihe von links nach rechts, um zu starten:</p>
            <div id="lockInDisplay">ASDFGHJKLÖ</div>
            <p id="deathMsg" style="color: #ff0000; font-size: 30px; margin-top: 20px; text-shadow: 0 0 10px #ff0000; display: none;"></p>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-synthwave-arcade-fast-136.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const wordDisplay = document.getElementById('wordDisplay');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const lockInDisplay = document.getElementById('lockInDisplay');
        const deathMsg = document.getElementById('deathMsg');
        const bgMusic = document.getElementById('bgMusic');

        // Erweiterter Wortschatz (Nur Grundreihe)
        const wordsLevel1 = ["a", "s", "d", "f", "g", "h", "j", "k", "l", "ö"];
        const wordsLevel2 = ["as", "df", "gh", "jk", "lö", "sa", "fd", "hj", "kl", "da", "la", "ha"];
        const wordsLevel3 = ["das", "fad", "lass", "fall", "saal", "hall", "kahl", "als", "lag", "fass", "glas", "schlag"];

        const lockInTarget = "asdfghjklö";
        let lockInIndex = 0;
        let gameState = 'LOCK_IN'; // 'LOCK_IN', 'PLAYING', 'GAME_OVER'

        let score = 0;
        let level = 1;
        let gameSpeed = 5;
        let backgroundOffset = 0;
        let currentWord = "";
        let typedText = "";
        
        const baseGroundY = 380;

        const player = {
            x: 100, y: baseGroundY - 40,
            width: 40, height: 40,
            dy: 0, jumpForce: -14, gravity: 0.8,
            isJumping: false, rotation: 0
        };

        const obstacles = [];
        let particles = [];
        let frames = 0;

        function updateLockInUI() {
            let html = "";
            for (let i = 0; i < lockInTarget.length; i++) {
                if (i < lockInIndex) html += `<span class="lock-typed">${lockInTarget[i].toUpperCase()}</span>`;
                else html += `<span>${lockInTarget[i].toUpperCase()}</span>`;
            }
            lockInDisplay.innerHTML = html;
        }

        function initGame() {
            score = 0; level = 1; gameSpeed = 5;
            player.y = baseGroundY - player.height;
            player.dy = 0; player.isJumping = false; player.rotation = 0;
            obstacles.length = 0; particles = []; frames = 0;
            
            bgMusic.volume = 0.3;
            bgMusic.play().catch(e => console.log("Audio needs user interaction"));

            spawnObstacle();
            updateUI();
            
            gameState = 'PLAYING';
            overlay.style.display = 'none';
            deathMsg.style.display = 'none';
            gameLoop();
        }

        function createParticles(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 1) * 12,
                    size: Math.random() * 6 + 2,
                    life: 1, color: color
                });
            }
        }

        function spawnObstacle() {
            let type = Math.random();
            let obs = { x: canvas.width, passed: false };

            if (type < 0.4) {
                // Nur Stachel
                obs.type = 'spike';
                obs.y = baseGroundY - 40;
                obs.width = 40; obs.height = 40;
            } else {
                // Plattform MIT Lava darunter! (Man MUSS springen)
                obs.type = 'platform_lava';
                obs.y = baseGroundY - 100; // Hoch in der Luft
                obs.width = 200; obs.height = 20;
            }
            obstacles.push(obs);
            
            let wordList = level === 1 ? wordsLevel1 : (level === 2 ? wordsLevel2 : wordsLevel3);
            currentWord = wordList[Math.floor(Math.random() * wordList.length)];
            typedText = "";
            renderWord();
        }

        function renderWord(isError = false) {
            let html = "";
            for (let i = 0; i < currentWord.length; i++) {
                if (i < typedText.length) html += `<span class="typed">${currentWord[i]}</span>`;
                else if (i === typedText.length && isError) html += `<span class="error">${currentWord[i]}</span>`;
                else html += `<span class="untyped">${currentWord[i]}</span>`;
            }
            wordDisplay.innerHTML = html;
        }

        function jump() {
            if (!player.isJumping) {
                player.dy = player.jumpForce;
                player.isJumping = true;
                createParticles(player.x + player.width/2, player.y + player.height, "#0ff");
            }
        }

        function gameOver(reason) {
            gameState = 'GAME_OVER';
            bgMusic.pause();
            createParticles(player.x + player.width/2, player.y + player.height/2, "#ff0000", 40);
            
            setTimeout(() => {
                overlay.style.display = 'flex';
                overlayTitle.innerText = "SYSTEM FAILURE";
                overlayTitle.style.color = "#ff0000";
                overlayTitle.style.textShadow = "0 0 20px #ff0000";
                deathMsg.innerText = reason;
                deathMsg.style.display = 'block';
                
                // Reset Lock-in for retry
                lockInIndex = 0;
                updateLockInUI();
                gameState = 'LOCK_IN';
            }, 1000); // 1 Sekunde Verzögerung für die Explosion
        }

        document.addEventListener('keydown', (e) => {
            if (["Shift", "Control", "Alt", "CapsLock"].includes(e.key)) return;
            const key = e.key.toLowerCase();

            if (gameState === 'LOCK_IN') {
                if (key === lockInTarget[lockInIndex]) {
                    lockInIndex++;
                    updateLockInUI();
                    if (lockInIndex === lockInTarget.length) initGame();
                } else {
                    lockInIndex = 0; // Fehler = Von vorne anfangen (Striktes Ritual)
                    updateLockInUI();
                }
                return;
            }

            if (gameState !== 'PLAYING') return;

            const expectedChar = currentWord[typedText.length];
            if (key === expectedChar) {
                typedText += key;
                renderWord();
                if (typedText === currentWord) {
                    jump();
                    wordDisplay.innerHTML = ""; 
                }
            } else {
                renderWord(true); 
                wordDisplay.classList.remove('shake-active');
                void wordDisplay.offsetWidth; 
                wordDisplay.classList.add('shake-active');
            }
        });

        function update() {
            if (gameState !== 'PLAYING') return;
            frames++;
            backgroundOffset -= gameSpeed * 0.4;
            if (backgroundOffset <= -40) backgroundOffset = 0;

            player.dy += player.gravity;
            player.y += player.dy;

            if (player.isJumping) player.rotation += 0.15;
            else player.rotation = Math.round(player.rotation / (Math.PI/2)) * (Math.PI/2);

            let currentFloorY = baseGroundY;
            let onLava = false;

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                if (obs.type === 'spike') {
                    if (player.x < obs.x + obs.width - 10 && player.x + player.width - 10 > obs.x &&
                        player.y < obs.y + obs.height && player.y + player.height > obs.y + 10) {
                        gameOver("IMPALED BY SPIKE!");
                    }
                } 
                else if (obs.type === 'platform_lava') {
                    // Check Lava (Boden unter der Plattform)
                    if (player.x + player.width/2 > obs.x && player.x + player.width/2 < obs.x + obs.width) {
                        onLava = true; // Spieler ist in der X-Zone der Lava
                    }

                    // Check Plattform Landung
                    if (player.dy > 0 && player.y + player.height >= obs.y && player.y + player.height <= obs.y + 25 &&
                        player.x + player.width > obs.x && player.x < obs.x + obs.width) {
                        currentFloorY = obs.y;
                        player.y = currentFloorY - player.height;
                        player.dy = 0;
                        if(player.isJumping) {
                            player.isJumping = false;
                            createParticles(player.x + player.width/2, player.y + player.height, "#f0f");
                        }
                        onLava = false; // Sicher auf Plattform
                    } 
                    // Gegen Plattform-Wand krachen
                    else if (player.x + player.width > obs.x + 5 && player.x < obs.x + obs.width &&
                             player.y + player.height > obs.y + 5 && player.y < obs.y + obs.height) {
                        gameOver("CRASHED INTO PLATFORM!");
                    }
                }

                if (obs.x + obs.width < player.x && !obs.passed) {
                    obs.passed = true;
                    score += 10;
                    gameSpeed += 0.05;
                    if (score === 80) level = 2;
                    if (score === 200) level = 3;
                }
            }

            // Lava Tod
            if (onLava && player.y >= baseGroundY - player.height - 5) {
                gameOver("BURNED IN LAVA!");
            }

            // Normaler Boden
            if (player.y >= baseGroundY - player.height && currentFloorY === baseGroundY && !onLava) {
                player.y = baseGroundY - player.height;
                player.dy = 0;
                if(player.isJumping) {
                    player.isJumping = false;
                    createParticles(player.x + player.width/2, player.y + player.height, "#0ff");
                }
            }

            // Array aufräumen
            if (obstacles.length > 0 && obstacles[0].x + obstacles[0].width < -100) {
                obstacles.shift();
                spawnObstacle();
            }

            // Partikel updaten
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.04;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Retro Sun Background
            ctx.fillStyle = "#ff0055";
            ctx.beginPath();
            ctx.arc(400, 250, 150, Math.PI, 0);
            ctx.fill();
            // Sun stripes
            ctx.fillStyle = "#200122";
            for(let i=0; i<5; i++) {
                ctx.fillRect(200, 200 - (i*20), 400, i*3);
            }

            // Neon Grid Floor
            ctx.strokeStyle = "#f0f";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10; ctx.shadowColor = "#f0f";
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i + backgroundOffset, baseGroundY);
                ctx.lineTo(i + backgroundOffset - 150, canvas.height); // Perspektive
                ctx.stroke();
            }
            
            // Bodenlinie
            ctx.strokeStyle = "#0ff"; ctx.shadowColor = "#0ff"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, baseGroundY); ctx.lineTo(canvas.width, baseGroundY); ctx.stroke();
            ctx.shadowBlur = 0;

            // Hindernisse zeichnen
            obstacles.forEach(obs => {
                if (obs.type === 'spike') {
                    ctx.shadowBlur = 15; ctx.shadowColor = "#ff0000"; ctx.fillStyle = "#ff0000";
                    ctx.beginPath();
                    ctx.moveTo(obs.x + obs.width / 2, obs.y);
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                    ctx.lineTo(obs.x, obs.y + obs.height);
                    ctx.closePath(); ctx.fill();
                } 
                else if (obs.type === 'platform_lava') {
                    // Lava auf dem Boden zeichnen
                    ctx.fillStyle = (frames % 20 < 10) ? "#ff3300" : "#ff0000"; // Animierte Lava
                    ctx.shadowBlur = 20; ctx.shadowColor = "#ff0000";
                    ctx.fillRect(obs.x, baseGroundY, obs.width, 20);
                    
                    // Schwebende Plattform zeichnen
                    ctx.shadowBlur = 15; ctx.shadowColor = "#f0f";
                    ctx.fillStyle = "#f0f";
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.fillStyle = "#111";
                    ctx.fillRect(obs.x + 3, obs.y + 3, obs.width - 6, obs.height - 6);
                }
                ctx.shadowBlur = 0;
            });

            // Partikel
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;

            // Spieler zeichnen
            if (gameState !== 'GAME_OVER') {
                ctx.save();
                ctx.translate(player.x + player.width/2, player.y + player.height/2);
                ctx.rotate(player.rotation);
                ctx.fillStyle = "#0ff";
                ctx.shadowBlur = 20; ctx.shadowColor = "#0ff";
                ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
                ctx.fillStyle = "#000";
                ctx.fillRect(-player.width/4, -player.height/4, player.width/2, player.height/2);
                ctx.restore();
            }
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = "SCORE: " + score;
            document.getElementById('levelDisplay').innerText = "LEVEL: " + level;
        }

        function gameLoop() {
            update();
            draw();
            if (gameState === 'PLAYING' || particles.length > 0) {
                if(gameState === 'PLAYING') updateUI();
                requestAnimationFrame(gameLoop);
            }
        }

        // Startbildschirm initialisieren
        updateLockInUI();
        draw(); // Zeichnet Hintergrund 1x
    </script>
</body>
</html>
